<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#f4f4f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0d0e12" media="(prefers-color-scheme: dark)">
    <meta name="description" content="A sleek and modern digital clock built with HTML, CSS, and JavaScript. Perfect for checking the time with a stylish flip animation effect.">
    <meta name="keywords" content="digital clock, JavaScript clock, CSS clock, HTML time display, flip animation clock, current time">
    <meta name="author" content="Muhammad Rabiul">
    <meta property="og:title" content="Digital Clock - JavaScript">
    <meta property="og:description" content="A sleek and modern digital clock built with HTML, CSS, and JavaScript featuring a stylish flip animation effect.">
    <meta property="og:image" content="https://devrabiul.github.io/digital-clock/screenshot.png">
    <meta property="og:url" content="https://devrabiul.github.io/digital-clock/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Digital Clock - JavaScript">
    <meta name="twitter:description" content="A stylish digital clock built with HTML, CSS, and JavaScript. Check the current time with a modern flip animation.">
    <meta name="twitter:image" content="https://devrabiul.github.io/digital-clock/screenshot.png">
    <title>Digital Clock - JavaScript</title>

    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'dark' || t === 'light') {
                    document.documentElement.setAttribute('data-theme', t);
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>

    <div class="bg-particles" aria-hidden="true">
        <span class="particle" style="--x: 4%;  --size: 14px; --duration: 22s; --delay: -3s;  --color: #ff6b9d;"></span>
        <span class="particle square" style="--x: 10%; --size: 20px; --duration: 28s; --delay: -15s; --color: #ffa45c;"></span>
        <span class="particle triangle" style="--x: 16%; --size: 24px; --duration: 18s; --delay: -8s;  --color: #ffd166;"></span>
        <span class="particle ring" style="--x: 22%; --size: 26px; --duration: 32s; --delay: -20s; --color: #06d6a0;"></span>
        <span class="particle star" style="--x: 28%; --size: 22px; --duration: 24s; --delay: -5s;  --color: #4cc9f0;"></span>
        <span class="particle blob" style="--x: 34%; --size: 18px; --duration: 20s; --delay: -12s; --color: #7209b7;"></span>
        <span class="particle hexagon" style="--x: 40%; --size: 28px; --duration: 35s; --delay: -25s; --color: #f72585;"></span>
        <span class="particle diamond" style="--x: 46%; --size: 16px; --duration: 23s; --delay: -7s;  --color: #fb8500;"></span>
        <span class="particle square" style="--x: 52%; --size: 22px; --duration: 30s; --delay: -18s; --color: #00bbf9;"></span>
        <span class="particle ring" style="--x: 58%; --size: 18px; --duration: 17s; --delay: -2s;  --color: #c77dff;"></span>
        <span class="particle star" style="--x: 64%; --size: 20px; --duration: 26s; --delay: -14s; --color: #ff006e;"></span>
        <span class="particle plus" style="--x: 70%; --size: 18px; --duration: 21s; --delay: -10s; --color: #ffbe0b;"></span>
        <span class="particle" style="--x: 76%; --size: 14px; --duration: 29s; --delay: -22s; --color: #8338ec;"></span>
        <span class="particle triangle" style="--x: 82%; --size: 26px; --duration: 33s; --delay: -6s;  --color: #3a86ff;"></span>
        <span class="particle diamond" style="--x: 88%; --size: 18px; --duration: 19s; --delay: -16s; --color: #fb5607;"></span>
        <span class="particle blob" style="--x: 94%; --size: 22px; --duration: 27s; --delay: -9s;  --color: #80ed99;"></span>
        <span class="particle star" style="--x: 14%; --size: 18px; --duration: 25s; --delay: -19s; --color: #06d6a0;"></span>
        <span class="particle ring" style="--x: 44%; --size: 20px; --duration: 31s; --delay: -13s; --color: #ff006e;"></span>
        <span class="particle plus" style="--x: 62%; --size: 22px; --duration: 34s; --delay: -21s; --color: #ffd166;"></span>
        <span class="particle hexagon" style="--x: 84%; --size: 16px; --duration: 20s; --delay: -4s;  --color: #c77dff;"></span>
    </div>

    <button id="fullscreen-btn" class="action-btn fullscreen-btn" aria-label="Toggle full-screen mode">
        <span class="fullscreen-icon"></span>
        <span class="fullscreen-icon"></span>
        <span class="fullscreen-icon"></span>
        <span class="fullscreen-icon"></span>
    </button>

    <button id="theme-btn" class="action-btn" aria-label="Toggle light and dark theme">
        <span class="theme-icon"></span>
    </button>

    <a class="action-btn github-btn" aria-label="github" href="https://github.com/devrabiul" target="_blank" rel="noopener">
        <img src="github.svg" alt="github profile">
    </a>


    <div class="root-container" data-mode="clock">
        <div class="mode-switcher" role="tablist" aria-label="Display mode">
            <button class="mode-btn active" data-mode="clock" role="tab" aria-selected="true">Clock</button>
            <button class="mode-btn" data-mode="stopwatch" role="tab" aria-selected="false">Stopwatch</button>
            <button class="mode-btn" data-mode="timer" role="tab" aria-selected="false">Timer</button>
        </div>

        <div class="clock-header-container clock-top-header">
            <div class="clock-header-day"></div>
        </div>

        <div class="digital-clock-container">
            <!-- Hour Group -->
            <div class="group-container" data-type="hour">
                <div class="digit-item">0</div>
                <div class="digit-item">0</div>
                <div class="digit-item-type">Hour</div>
            </div>

            <!-- Separator -->
            <div class="separator">
                <div class="separator-item"></div>
                <div class="separator-item"></div>
            </div>

            <!-- Minute Group -->
            <div class="group-container" data-type="minute">
                <div class="digit-item">0</div>
                <div class="digit-item">0</div>
                <div class="digit-item-type">Minute</div>
            </div>

            <!-- Separator -->
            <div class="separator">
                <div class="separator-item"></div>
                <div class="separator-item"></div>
            </div>

            <!-- Second Group -->
            <div class="group-container" data-type="second">
                <div class="digit-item">0</div>
                <div class="digit-item">0</div>
                <div class="digit-item-type">Second</div>
            </div>

            <!-- Separator -->
            <div class="separator">
                <div class="separator-item"></div>
                <div class="separator-item"></div>
            </div>

            <!-- AM/PM Group -->
            <div class="group-container" data-type="ampm">
                <div class="digit-item">0</div>
                <div class="digit-item">0</div>
                <div class="digit-item-type">AM/PM</div>
            </div>
        </div>

        <div class="clock-controls">
            <div class="controls-group" data-controls="stopwatch">
                <div class="controls-row">
                    <button class="control-btn primary" id="sw-toggle">Start</button>
                    <button class="control-btn" id="sw-reset">Reset</button>
                </div>
            </div>

            <div class="controls-group" data-controls="timer">
                <div class="timer-presets" role="group" aria-label="Timer presets">
                    <button class="preset-btn" data-preset="60">1m</button>
                    <button class="preset-btn active" data-preset="300">5m</button>
                    <button class="preset-btn" data-preset="600">10m</button>
                    <button class="preset-btn" data-preset="1500">25m</button>
                    <button class="preset-btn" data-preset="3600">1h</button>
                </div>
                <div class="timer-adjusters" role="group" aria-label="Custom duration">
                    <div class="adjuster">
                        <button class="adjust-btn" data-adjust="hour" data-delta="1" aria-label="Increase hours">+</button>
                        <span class="adjuster-label">H</span>
                        <button class="adjust-btn" data-adjust="hour" data-delta="-1" aria-label="Decrease hours">−</button>
                    </div>
                    <div class="adjuster">
                        <button class="adjust-btn" data-adjust="minute" data-delta="1" aria-label="Increase minutes">+</button>
                        <span class="adjuster-label">M</span>
                        <button class="adjust-btn" data-adjust="minute" data-delta="-1" aria-label="Decrease minutes">−</button>
                    </div>
                    <div class="adjuster">
                        <button class="adjust-btn" data-adjust="second" data-delta="1" aria-label="Increase seconds">+</button>
                        <span class="adjuster-label">S</span>
                        <button class="adjust-btn" data-adjust="second" data-delta="-1" aria-label="Decrease seconds">−</button>
                    </div>
                </div>
                <div class="controls-row">
                    <button class="control-btn primary" id="tm-toggle">Start</button>
                    <button class="control-btn" id="tm-reset">Reset</button>
                </div>
            </div>
        </div>

        <div class="clock-header-container clock-bottom-header">
            <div class="clock-header-date"></div>
            <div class="clock-header-month"></div>
            <div class="clock-header-year"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
